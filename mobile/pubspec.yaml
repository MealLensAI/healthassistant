name: meallensai_mobile
description: "MeallensAI - AI-powered health meal planning mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State / routing
  provider: ^6.1.2
  go_router: ^14.2.0

  # Networking
  http: ^1.2.1
  http_parser: ^4.0.2

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # UI / Utilities
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_markdown: ^0.7.3
  fluttertoast: ^8.2.6
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
